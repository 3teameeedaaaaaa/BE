spring:
  application:
    name: water

  datasource:
    url: jdbc:mysql://localhost:3306/water_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
#EC2    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

logging:
  level:
    com.example.water: debug
    org.hibernate.SQL: debug

# 사용자 정의 설정
api:
  key: ${GEMINI_API_KEY:your_default_key_here}