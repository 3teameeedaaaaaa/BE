spring:
  application:
    name: water

  datasource:
    url: jdbc:mysql://localhost:3306/water_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 0000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

logging:
  level:
    com.example.water: debug
    org.hibernate.SQL: debug

# 사용자 정의 설정
api:
    [your valuable]:
    key: ${GEMINI_API_KEY:your_default_key_here}